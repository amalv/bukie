pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{ts,tsx}"
      run: bun run prettier --write {staged_files}
    eslint:
      glob: "*.{ts,tsx}"
      run: bun run eslint --fix {staged_files}
    tests:
      glob: "*test.{ts,tsx}"
      run: bun run test:staged {staged_files}
commit-msg:
  commands:
    "lint commit message":
      run: bun run commitlint --edit {1}
